<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>健康管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--tx);font-size:14px;-webkit-text-size-adjust:100%;}
:root{
  --g:#1D9E75;--gd:#15724f;--gl:rgba(29,158,117,.12);
  --or:#d97706;--ol:rgba(217,119,6,.12);
  --re:#dc2626;--rl:rgba(220,38,38,.1);
  --bl:#2563eb;--bll:rgba(37,99,235,.1);
  --bg:#F7F5F2;--sf:#fff;--bd:#e5e1db;--bm:#d1cdc7;
  --tx:#1a1a1a;--tm:#6b7280;--th:#9ca3af;
  --al:rgba(217,119,6,.1);
  --r1:8px;--r2:12px;--r3:16px;--r4:20px;
}
/* layout */
#loginPage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px;}
#appShell{display:none;flex-direction:column;height:100dvh;max-width:500px;margin:0 auto;position:relative;}
.topbar{background:var(--sf);border-bottom:.5px solid var(--bd);padding:0 12px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:var(--g);display:flex;align-items:center;gap:5px;}
.pages{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.page{display:none;padding:12px 12px 30px;}
.page.active{display:block;}
.tnav{background:var(--sf);border-bottom:.5px solid var(--bd);display:flex;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.tnav::-webkit-scrollbar{display:none;}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 7px;cursor:pointer;gap:2px;color:var(--th);font-size:10px;transition:color .15s;white-space:nowrap;min-width:52px;}
.ni i{font-size:19px;}
.ni.on{color:var(--g);}
.ni.on span{font-weight:600;}
/* modal */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center;}
.ov.show{display:flex;}
.sheet{background:var(--sf);border-radius:20px 20px 0 0;padding:20px 20px calc(env(safe-area-inset-bottom)+28px);width:100%;max-width:500px;max-height:92vh;overflow-y:auto;}
.shandle{width:36px;height:4px;background:var(--bm);border-radius:2px;margin:0 auto 14px;}
.sh-title{font-size:16px;font-weight:700;margin-bottom:14px;padding-left:30px;}
/* cards */
.card{background:var(--sf);border-radius:var(--r2);border:.5px solid var(--bd);padding:12px;margin-bottom:9px;}
.card-title{font-size:13px;font-weight:600;color:var(--tm);display:flex;align-items:center;gap:5px;margin-bottom:10px;}
.banner{background:linear-gradient(135deg,var(--g),var(--gd));border-radius:var(--r2);padding:16px;color:#fff;margin-bottom:9px;text-align:center;}
.banner h3{font-size:13px;opacity:.85;margin-bottom:6px;}
.banner .big{font-size:34px;font-weight:700;line-height:1;}
.banner .sub{font-size:12px;opacity:.8;margin-top:4px;}
/* forms */
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fl{font-size:12px;font-weight:600;color:var(--tm);}
.fi{border:.5px solid var(--bm);border-radius:var(--r1);padding:10px 12px;font-size:14px;font-family:inherit;background:var(--sf);color:var(--tx);width:100%;outline:none;transition:border-color .15s;}
.fi:focus{border-color:var(--g);}
textarea.fi{resize:vertical;min-height:60px;}
.fgroup{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--r2);padding:14px 14px 1px;margin-bottom:14px;}
.fgroup:last-of-type{margin-bottom:0;}
.fsec{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;color:var(--tx);margin-bottom:12px;}
.fsec i{font-size:15px;color:var(--g);}
/* buttons */
.btn{display:inline-flex;align-items:center;gap:5px;padding:10px 14px;border-radius:var(--r2);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s;}
.btn:active{opacity:.75;}
.btn-g{background:var(--g);color:#fff;}
.btn-o{background:var(--ol);color:var(--or);}
.btn-r{background:var(--rl);color:var(--re);}
.btn-bl{width:100%;justify-content:center;margin-top:6px;}
.btn-sm{padding:6px 11px;font-size:12px;}
.nbtn{background:none;border:none;cursor:pointer;padding:5px;border-radius:var(--r1);color:var(--tm);font-size:16px;font-family:inherit;}
.nbtn:active{opacity:.6;}
/* list items */
.cust-item{background:var(--sf);border-radius:var(--r2);border:.5px solid var(--bd);padding:11px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s;}
.cust-item:active{background:var(--bg);}
.av{background:var(--gl);color:var(--gd);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;width:38px;height:38px;font-size:14px;}
/* badges */
.sbadge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;}
.sb-ok{background:var(--gl);color:var(--gd);}
.sb-warn{background:var(--ol);color:var(--or);}
.sb-danger{background:var(--rl);color:var(--re);}
.sb-new{background:var(--bll);color:var(--bl);}
/* tags */
.tgrid{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;}
.tag{border:1px solid var(--bm);border-radius:20px;padding:5px 11px;font-size:12px;cursor:pointer;background:var(--sf);color:var(--tm);font-family:inherit;}
.tag.on{background:var(--gl);color:var(--gd);border-color:var(--g);}
/* back */
.back{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--tm);cursor:pointer;margin-bottom:12px;padding:4px 0;}
/* search */
.search-wrap{position:relative;margin-bottom:10px;}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--th);font-size:16px;}
.search-wrap input{padding-left:32px;}
/* tabs */
.ctabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;scrollbar-width:none;}
.ctabs::-webkit-scrollbar{display:none;}
.ctab{border:.5px solid var(--bm);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap;background:var(--sf);color:var(--tm);font-family:inherit;}
.ctab.on{background:var(--g);color:#fff;border-color:var(--g);}
/* sh */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;}
.stl{font-size:16px;font-weight:700;}
/* progress */
.pt{height:6px;background:var(--bd);border-radius:3px;overflow:hidden;}
.pf{height:100%;background:var(--g);border-radius:3px;transition:width .4s;}
/* chart */
.chwrap{height:160px;position:relative;}
/* table */
.twrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table.wt{width:100%;border-collapse:collapse;font-size:11px;min-width:480px;}
table.wt th{background:var(--bg);padding:6px 8px;text-align:left;font-weight:600;border-bottom:.5px solid var(--bd);}
table.wt td{padding:6px 8px;border-bottom:.5px solid var(--bd);}
/* photo */
.bafoto{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bafoto-ph{aspect-ratio:3/4;border-radius:var(--r1);border:.5px solid var(--bm);display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;background:var(--bg);}
.bafoto-ph img{width:100%;height:100%;object-fit:cover;}
/* role switch */
.role-sw{display:flex;background:var(--bg);border-radius:20px;border:.5px solid var(--bm);padding:2px;gap:1px;}
.role-sw span{padding:3px 8px;border-radius:18px;font-size:11px;font-weight:500;cursor:pointer;color:var(--tm);}
.role-sw span.on{background:var(--g);color:#fff;}
/* fu cards */
.fu-card{border-radius:var(--r2);padding:11px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.fu-danger{background:var(--rl);}
.fu-warn{background:var(--ol);}
.fu-ok{background:var(--gl);}
/* hint bars */
.hint-bar{font-size:11px;padding:7px 10px;border-radius:var(--r1);margin-bottom:6px;display:flex;align-items:flex-start;gap:6px;line-height:1.5;}
.hint-bar i{font-size:14px;flex-shrink:0;margin-top:1px;}
.hint-ok{background:#f0fdf4;color:#15803d;}
.hint-warn{background:var(--ol);color:#92400e;}
.hint-info{background:var(--bll);color:#1d4ed8;}
.hint-danger{background:var(--rl);color:var(--re);}
/* ref bar */
.ref-bar{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:6px 0;border-bottom:.5px solid var(--bd);}
.ref-bar:last-child{border-bottom:none;}
.ref-range{color:var(--th);}
.ref-ok{color:var(--g);}
.ref-warn{color:var(--or);}
.ref-danger{color:var(--re);}
/* plan cards */
.plan-card{border-radius:var(--r2);border:.5px solid var(--bd);overflow:hidden;margin-bottom:10px;background:var(--sf);}
.plan-head-w{background:#EFF6FF;}.plan-head-f{background:#FFF7ED;}.plan-head-b{background:#F0FDF4;}
.plan-badge-w{background:#BFDBFE;color:#1d4ed8;}.plan-badge-f{background:#FED7AA;color:#9a3412;}.plan-badge-b{background:#BBF7D0;color:#15803d;}
.plan-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;}
.plan-body{padding:0 12px 12px;}
.plan-sec-title{font-size:11px;font-weight:600;color:var(--tm);margin:10px 0 3px;display:flex;align-items:center;gap:4px;}
/* chips */
.chips-wrap{display:flex;flex-wrap:wrap;min-height:38px;padding:5px;border:.5px solid var(--bm);border-radius:var(--r1);gap:4px;margin-bottom:8px;background:var(--sf);}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--gl);color:var(--gd);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:500;}
.chip-x{cursor:pointer;font-size:14px;line-height:1;}
/* select card */
.sel-card{border:.5px solid var(--bm);border-radius:var(--r2);padding:10px;margin-bottom:7px;cursor:pointer;transition:all .15s;}
.sel-card.on{border-color:var(--g);background:var(--gl);}
/* dealer */
.dealer-cust{background:var(--sf);border-radius:var(--r2);border:.5px solid var(--bd);padding:11px 12px;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
/* guide */
.guide-item{background:var(--sf);border-radius:var(--r2);border:.5px solid var(--bd);margin-bottom:9px;overflow:hidden;}
.guide-img{width:100%;height:100px;object-fit:cover;}
.guide-body{padding:10px 12px;}
/* period tabs */
.ptabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px;}
.ptabs::-webkit-scrollbar{display:none;}
.ptab{border:.5px solid var(--bm);border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;white-space:nowrap;background:var(--sf);color:var(--tm);font-family:inherit;flex-shrink:0;}
.ptab.on{background:var(--g);color:#fff;border-color:var(--g);}
/* ii */
.ii-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.ii{background:var(--bg);border-radius:var(--r1);padding:8px 10px;}
.il{font-size:10px;color:var(--tm);}
.iv{font-size:14px;font-weight:600;margin-top:2px;}
/* empty */
.empty{text-align:center;padding:36px 16px;color:var(--th);}
.empty i{font-size:36px;margin-bottom:8px;display:block;}
/* toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;z-index:999;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;}
.toast.show{opacity:1;}
/* login */
.login-card{background:var(--sf);border-radius:var(--r4);padding:28px 22px;width:100%;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.login-logo{font-size:28px;font-weight:700;color:var(--g);margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--tm);margin-bottom:22px;}
/* qa */
.qa-q{font-size:13px;font-weight:500;margin-bottom:6px;}
.qa-opts{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.qo{border:.5px solid var(--bm);border-radius:20px;padding:5px 11px;font-size:12px;cursor:pointer;background:var(--sf);font-family:inherit;}
.qo.on{background:var(--g);color:#fff;border-color:var(--g);}
/* photos */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px;}
.photo-slot{aspect-ratio:1;border-radius:var(--r1);border:.5px solid var(--bm);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:var(--bg);}
.photo-slot img{width:100%;height:100%;object-fit:cover;}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- Login -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo"><i class="ti ti-leaf"></i> 健康管理</div>
    <div class="login-sub">請輸入您的姓名登入</div>
    <div class="fg"><input class="fi" id="loginName" placeholder="姓名" style="font-size:16px;padding:11px 13px"/></div>
    <button class="btn btn-g btn-bl" id="loginBtn"><i class="ti ti-login"></i> 登入</button>
  </div>
</div>

<!-- App Shell -->
<div id="appShell">
  <div class="topbar">
    <div class="topbar-title"><i class="ti ti-leaf"></i> 健康管理</div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="role-sw" id="roleSw"></div>
      <i class="ti ti-logout" style="font-size:19px;color:var(--tm);cursor:pointer" id="logoutBtn"></i>
    </div>
  </div>
  <nav class="tnav" id="bottomNav"></nav>
  <div class="pages" id="pagesWrap">

    <!-- 顧客列表 -->
    <div class="page" id="pg-list">
      <div class="sh"><div class="stl">顧客</div>
        <button class="btn btn-g btn-sm" id="addCustBtn"><i class="ti ti-plus"></i> 新增</button>
      </div>
      <div id="catTabsWrap" class="ctabs"></div>
      <div class="search-wrap"><i class="ti ti-search"></i><input class="fi" id="searchInput" placeholder="搜尋顧客…"/></div>
      <div id="custList"></div>
    </div>

    <!-- 顧客詳情 -->
    <div class="page" id="pg-detail">
      <div class="back" id="detailBack"><i class="ti ti-chevron-left"></i> 返回</div>
      <div id="detailBody"></div>
    </div>

    <!-- 量測輸入 -->
    <div class="page" id="pg-input">
      <div class="back" id="inputBack"><i class="ti ti-chevron-left"></i> 返回</div>
      <div id="inputBody"></div>
    </div>

    <!-- 回訪提醒 -->
    <div class="page" id="pg-followup">
      <div class="sh"><div class="stl">回訪提醒</div>
        <button class="btn btn-o btn-sm" id="fuSettingsBtn"><i class="ti ti-settings"></i> 設定</button>
      </div>
      <div id="followupBody"></div>
    </div>

    <!-- 營養師每日回報 -->
    <div class="page" id="pg-daily">
      <div class="sh"><div class="stl">顧客回報</div></div>
      <div id="dailyBody"></div>
    </div>

    <!-- 初始計劃卡 -->
    <div class="page" id="pg-plans">
      <div class="sh"><div class="stl">初始計劃卡</div>
        <button class="btn btn-g btn-sm" id="addPlanBtn"><i class="ti ti-plus"></i> 新增</button>
      </div>
      <div id="planList"></div>
    </div>

    <!-- 飲食指南 -->
    <div class="page" id="pg-guide">
      <div class="sh"><div class="stl">飲食指南</div>
        <button class="btn btn-g btn-sm" id="addGuideBtn" style="display:none"><i class="ti ti-plus"></i> 新增</button>
      </div>
      <div class="ctabs">
        <button class="ctab on" id="gt0">專欄文章</button>
        <button class="ctab" id="gt1">如何挑選飲食</button>
      </div>
      <div id="guideList"></div>
    </div>

    <!-- 使用者管理 -->
    <div class="page" id="pg-users">
      <div class="sh"><div class="stl">使用者管理</div>
        <button class="btn btn-g btn-sm" id="addUserBtn"><i class="ti ti-plus"></i> 新增</button>
      </div>
      <button class="btn btn-o btn-sm" id="catMgmtBtn" style="margin-bottom:10px"><i class="ti ti-folders"></i> 管理分類</button>
      <div id="userList"></div>
    </div>

    <!-- 匯出 -->
    <div class="page" id="pg-export">
      <div class="sh"><div class="stl">資料匯出</div></div>
      <div id="exportBody"></div>
    </div>

    <!-- 顧客：我的進度 -->
    <div class="page" id="pg-progress">
      <div class="sh"><div class="stl">我的進度</div></div>
      <div id="progressBody"></div>
    </div>

    <!-- 顧客：每日回報 -->
    <div class="page" id="pg-cust-daily">
      <div class="sh"><div class="stl">每日回報</div></div>
      <div id="custDailyBody"></div>
    </div>

    <!-- 經銷商 -->
    <div class="page" id="pg-dealer">
      <div class="sh"><div class="stl">我的顧客</div></div>
      <div id="dealerBody"></div>
    </div>

  </div><!-- /pages -->
</div><!-- /appShell -->

<!-- Modal overlay -->
<div class="ov" id="ov">
  <div class="sheet" id="modalSheet">
    <div class="shandle"></div>
    <div class="sh-title" id="mTitle"></div>
    <div id="mBody"></div>
  </div>
</div>

<script>
(function(){
'use strict';

// ── helpers ──
var $ = function(id){ return document.getElementById(id); };
function qs(sel,ctx){ return (ctx||document).querySelector(sel); }
function qsa(sel,ctx){ return (ctx||document).querySelectorAll(sel); }
function on(id,ev,fn){ var el=$(id); if(el) el[ev]=fn; }
function toast(msg){
  var t=$('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}
function today(){
  var d=new Date(); 
  return d.getFullYear()+'-'+(d.getMonth()+1<10?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate();
}
function daysSince(ds){
  if(!ds) return 999;
  return Math.floor((Date.now()-new Date(ds).getTime())/86400000);
}
function el(tag,cls,html){
  var e=document.createElement(tag);
  if(cls) e.className=cls;
  if(html!==undefined) e.innerHTML=html;
  return e;
}
function openModal(){ $('ov').classList.add('show'); }
function closeModal(){ $('ov').classList.remove('show'); $('mBody').innerHTML=''; }
function goPage(id){
  qsa('.page').forEach(function(p){ p.classList.remove('active'); });
  $(id).classList.add('active');
}
function navActive(id){
  qsa('.ni').forEach(function(n){ n.classList.remove('on'); });
  var el=$(id); if(el) el.classList.add('on');
}

// ── constants ──
var SUPPS=['AB益生菌','維他命C','膠原蛋白','魚油','B群','鎂片','益纖粉','燃脂錠','蛋白飲','花椰菜粉'];
var BUYMETHODS=['現金','匯款','信用卡','Line Pay','其他'];
var QA=[
  {q:'今天喝水達標了嗎？',opts:['達標','差一點','沒有']},
  {q:'今天有運動嗎？',opts:['有','輕度','沒有']},
  {q:'今天睡眠品質？',opts:['很好','普通','不好']},
  {q:'今天飲食控制？',opts:['很好','普通','破戒了']},
  {q:'今天有吃保健品嗎？',opts:['全吃','部分','沒吃']},
  {q:'今天身體感覺？',opts:['很好','普通','不舒服']}
];
var ROLE_LABELS={nutritionist:'營養師',dealer:'經銷商',customer:'顧客'};

// ── state ──
var role='nutritionist';
var currentUser='宥霖';
var currentCid=null;
var currentPeriod=0;
var currentCat='全部';
var currentGuideTab=0;
var custFilter='';
var syncPulled=false;
var syncTimer=null;

// ── DB with localStorage ──
var STORAGE_KEY='jk_health_v1';
function dbDefault(){
  return {
    categories:['公司','瓊玉','莉芬','瓊萩','莉香','瓊雯','月聰','阿坡'],
    customers:[
      {id:1,name:'米亞貝',gender:'女',height:162,age:32,category:'公司',phone:'',health:'無',allergy:'無',
       products:'AB益生菌、維他命C',lastBuyMethod:'現金',lastBuyDate:'2025-01-10',

// ── auth ──
function doLogin(){
  var n=$('loginName').value.trim();
  if(!n){ toast('請輸入姓名'); return; }
  currentUser=n;
  var syncUrl=localStorage.getItem(SYNC_URL_KEY);
  function proceed(){
    syncPulled=true;
    var u=db.users.find(function(x){ return x.name===currentUser; });
    role=u?u.role:'customer';
    $('loginPage').style.display='none';
    $('appShell').style.display='flex';
    setupRoleSwitch(); setupNav();
  }
  if(syncUrl){
    var btn=$('loginBtn'); btn.disabled=true;
    btn.innerHTML='<i class="ti ti-loader"></i> 載入資料中…';
    var done=false;
    function finish(){
      if(done) return; done=true;
      btn.disabled=false; btn.innerHTML='<i class="ti ti-login"></i> 登入';
      proceed();
    }
    var fallback=setTimeout(finish,8000);
    fetch(syncUrl)
      .then(function(r){ return r.json(); })
      .then(function(data){
        clearTimeout(fallback);
        if(data&&data.customers){ db=data; localStorage.setItem(STORAGE_KEY,JSON.stringify(db)); }
        finish();
      })
      .catch(function(){ clearTimeout(fallback); finish(); });
  } else {
    proceed();
  }
}
function doLogout(){
  syncPulled=false;
  if(syncTimer){ clearTimeout(syncTimer); syncTimer=null; }
  $('loginPage').style.display='flex';
  $('appShell').style.display='none';
  $('loginName').value='宥霖';
}

// ── follow-up status ──
function getFollowUpStatus(c){
  var s=db.followUpSettings;
  var d=daysSince(c.lastVisitDate);
  var isNew=daysSince(c.createdDate)<=s.newCustomerDays;
  var freq=isNew?s.newFreqDays:s.oldFreqDays;
  var over=d-freq;
  var status=over>=s.dangerDays?'danger':over>=s.warnDays?'warn':'ok';
  var cls=status==='danger'?'sb-danger':status==='warn'?'sb-warn':'sb-ok';
  var label=status==='danger'?'危險':status==='warn'?'積極':'正常';
  return {status:status,cls:cls,label:label,daysSinceVisit:d,freqDays:freq,isNew:isNew};
}

// ── customer list ──
function renderCustList(filter){
  custFilter=filter||'';
  var list=$('custList'); list.innerHTML='';
  var cats=currentCat==='全部'?db.customers:db.customers.filter(function(c){ return c.category===currentCat; });
  var shown=filter?cats.filter(function(c){ return c.name.includes(filter)||(c.phone&&c.phone.includes(filter)); }):cats;
  if(!shown.length){ list.innerHTML='<div class="empty"><i class="ti ti-users"></i><p>沒有顧客</p></div>'; return; }
  shown.forEach(function(c){
    var fu=getFollowUpStatus(c);
    var pending=db.reports.filter(function(r){ return r.customerId===c.id&&!r.reply; }).length;
    var div=document.createElement('div');
    div.className='cust-item';
    div.innerHTML=
      '<div class="av">'+c.name[0]+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:14px;font-weight:500;display:flex;align-items:center;gap:5px">'+
          c.name+
          '<span class="sbadge '+fu.cls+'">'+fu.label+'</span>'+
          (c.category?'<span style="font-size:10px;background:var(--al);color:#6b4c10;padding:1px 6px;border-radius:10px">'+c.category+'</span>':'')+ 
        '</div>'+
        '<div style="font-size:12px;color:var(--tm);margin-top:2px">'+c.products+'</div>'+
      '</div>'+
      (pending>0?'<span class="sbadge sb-danger">'+pending+'則</span>':'');
    div.onclick=function(){ openCustomer(c.id); };
    list.appendChild(div);
  });
}

function renderSmartRef(c,p){
  var el=$('smartRefBody'); if(!el) return;
  var weeks=p.weeks;
  if(!weeks.length){ el.innerHTML='<div style="font-size:12px;color:var(--tm);text-align:center;padding:6px">輸入第一筆量測後即可查看分析</div>'; return; }
  var last=weeks[weeks.length-1], prev=weeks.length>=2?weeks[weeks.length-2]:null;
  var fatMin=c.gender==='女'?20:15, fatMax=c.gender==='女'?30:25;
  var fatOk=last.bodyFat>=fatMin&&last.bodyFat<=fatMax;
  var vfOk=last.visceralFat<=9, vfWarn=last.visceralFat<=14;
  var bmiOk=last.bmi>=18.5&&last.bmi<=24;
  var html=
    '<div class="ref-bar"><span>體脂率</span><div>'+
      '<span class="'+(last.bodyFat>0?(fatOk?'ref-ok':last.bodyFat<fatMin?'ref-ok':'ref-danger'):'')+'" style="font-weight:600">'+( last.bodyFat||'—')+'%</span>'+
      '<span class="ref-range"> (參考'+fatMin+'~'+fatMax+'%)</span>'+
      '<span class="sbadge '+(last.bodyFat>0?(fatOk?'sb-ok':'sb-danger'):'sb-new')+'" style="margin-left:5px">'+(last.bodyFat>0?(fatOk?'正常':last.bodyFat<fatMin?'偏低':'偏高'):'未填')+'</span>'+
    '</div></div>'+
    '<div class="ref-bar"><span>內臟脂肪</span><div>'+
      '<span class="'+(last.visceralFat>0?(vfOk?'ref-ok':vfWarn?'ref-warn':'ref-danger'):'')+'" style="font-weight:600">'+(last.visceralFat||'—')+'</span>'+
      '<span class="ref-range"> (≤9正常 ≤14偏高)</span>'+
      '<span class="sbadge '+(last.visceralFat>0?(vfOk?'sb-ok':vfWarn?'sb-warn':'sb-danger'):'sb-new')+'" style="margin-left:5px">'+(last.visceralFat>0?(vfOk?'正常':vfWarn?'偏高':'過高'):'未填')+'</span>'+
    '</div></div>'+
    '<div class="ref-bar"><span>BMI</span><div>'+
      '<span class="'+(last.bmi>0?(bmiOk?'ref-ok':last.bmi<18.5?'ref-ok':'ref-warn'):'')+'" style="font-weight:600">'+(last.bmi||'—')+'</span>'+
      '<span class="ref-range"> (18.5~24正常)</span>'+
      '<span class="sbadge '+(last.bmi>0?(bmiOk?'sb-ok':last.bmi<18.5?'sb-new':'sb-warn'):'sb-new')+'" style="margin-left:5px">'+(last.bmi>0?(bmiOk?'正常':last.bmi<18.5?'過輕':last.bmi<27?'過重':'肥胖'):'未填')+'</span>'+
    '</div></div>';
  if(prev){
    var wd=last.weight-prev.weight, fd=last.bodyFat-prev.bodyFat;
    if(wd<-1&&Math.abs(fd)<0.3) html+='<div class="hint-bar hint-warn" style="margin-top:6px"><i class="ti ti-droplet"></i><div>體重大幅下降但體脂變化不大，可能是水分流失，記得多補充水分！</div></div>';
    if(wd>0&&fd<-0.5) html+='<div class="hint-bar hint-info" style="margin-top:6px"><i class="ti ti-dumbbell"></i><div>體重微增但體脂下降，正在增肌！這是好事 💪</div></div>';
    if(wd<-0.3&&fd<-0.3) html+='<div class="hint-bar hint-ok" style="margin-top:6px"><i class="ti ti-trending-down"></i><div>體重與體脂同步下降，狀態非常理想！</div></div>';
    if(wd>0.5&&fd>0.3) html+='<div class="hint-bar hint-danger" style="margin-top:6px"><i class="ti ti-alert-triangle"></i><div>體重與體脂同時上升，需要重新檢視飲食和生活習慣。</div></div>';
  }
  el.innerHTML=html;
}

// ── reply modal ──
function showReplyModal(rid,fromDaily){
  var r=db.reports.find(function(x){ return x.id===rid; });
  var selChips=r.reply?[r.reply]:[];
  $('mTitle').textContent='回覆顧客';

  function rebuild(){
    var cats=[].concat([],db.templates.reduce(function(acc,t){ if(!acc.includes(t.category)) acc.push(t.category); return acc; },[]));
    var chipsHtml=selChips.map(function(txt,i){
      return '<span class="chip">'+txt+'<span class="chip-x" data-i="'+i+'">×</span></span>';
    }).join('') || '<span style="font-size:12px;color:var(--th);padding:4px">點選模板加入…</span>';
    $('mBody').innerHTML=
      '<div style="background:var(--bg);padding:8px 10px;border-radius:var(--r1);margin-bottom:10px;font-size:12px;color:var(--tm)">'+(r.note||'（無備註）')+'</div>'+
      '<div class="fl" style="margin-bottom:5px">📋 懶人包模板</div>'+
      '<div class="ctabs" id="tmplCats">'+
        cats.map(function(c,i){ return '<button class="ctab'+(i===0?' on':'')+'" data-cat="'+c+'">'+c+'</button>'; }).join('')+
        '<button class="ctab" style="border-style:dashed;flex-shrink:0" id="tmplMgmtBtn"><i class="ti ti-settings" style="font-size:11px"></i></button>'+
      '</div>'+
      '<div id="tmplItems" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px"></div>'+
      '<div class="fl" style="margin-bottom:4px">已選訊息</div>'+
      '<div class="chips-wrap">'+chipsHtml+'</div>'+
      '<button class="btn btn-o btn-sm" id="insertChipsBtn" style="width:100%;justify-content:center;margin-bottom:8px"><i class="ti ti-arrow-down"></i> 插入回覆框</button>'+
      '<div class="fg"><label class="fl">最終回覆</label><textarea class="fi" id="rTxt" rows="4">'+(r.reply||'')+'</textarea></div>'+
      '<button class="btn btn-g btn-bl" id="sendReplyBtn"><i class="ti ti-send"></i> 發送回覆</button>';
    // show first category
    showTmplCat(cats[0]);
    // chip remove
    qsa('.chip-x').forEach(function(btn){
      btn.onclick=function(){ selChips.splice(+btn.dataset.i,1); rebuild(); };
    });
    // category tabs
    qsa('#tmplCats .ctab[data-cat]').forEach(function(btn){
      btn.onclick=function(){
        qsa('#tmplCats .ctab').forEach(function(b){ b.classList.remove('on'); });
        btn.classList.add('on'); showTmplCat(btn.dataset.cat);
      };
    });
    on('tmplMgmtBtn','onclick',function(){ showTemplateMgmt(rid,fromDaily); });
    on('insertChipsBtn','onclick',function(){
      if(!selChips.length){ toast('請先選擇模板'); return; }
      $('rTxt').value=selChips.join('\n');
    });
    on('sendReplyBtn','onclick',function(){
      var t=$('rTxt').value.trim(); if(!t){ toast('請輸入回覆'); return; }
      r.reply=t; dbSave(); closeModal();
      if(fromDaily) renderNutriDaily(); else renderDetail();
      toast('✓ 已送出');
    });
  }
  function showTmplCat(cat){
    var items=db.templates.filter(function(t){ return t.category===cat; });
    var wrap=$('tmplItems'); if(!wrap) return;
    wrap.innerHTML='';
    items.forEach(function(t){
      var b=document.createElement('button');
      b.className='tag'; b.textContent=t.text.length>20?t.text.slice(0,20)+'…':t.text;
      b.onclick=function(){
        if(!selChips.includes(t.text)){ selChips.push(t.text); rebuild(); }
      };
      wrap.appendChild(b);
    });
  }
  openModal(); rebuild();
}

// ── template management ──
function showTemplateMgmt(rid,fromDaily){
  $('mTitle').textContent='管理回覆模板';
  function rebuildTmplList(){
    var list=$('tmplMgmtList'); if(!list) return;
    list.innerHTML='';
    db.templates.forEach(function(t){
      var row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:.5px solid var(--bd);';
      row.innerHTML='<span style="font-size:10px;background:var(--gl);color:var(--gd);padding:2px 7px;border-radius:10px;flex-shrink:0">'+t.category+'</span>'+
        '<span style="flex:1;font-size:12px">'+t.text+'</span>'+
        '<button class="nbtn del-tmpl" data-tid="'+t.id+'" style="color:var(--re)"><i class="ti ti-trash"></i></button>';
      list.appendChild(row);
    });
    qsa('.del-tmpl',list).forEach(function(btn){
      btn.onclick=function(){
        if(!confirm('刪除此模板？')) return;
        db.templates=db.templates.filter(function(x){ return x.id!==+btn.dataset.tid; });
        dbSave(); rebuildTmplList();
      };
    });
  }
  var cats=[].concat([],db.templates.reduce(function(acc,t){ if(!acc.includes(t.category)) acc.push(t.category); return acc; },[]));
  var datalist=cats.map(function(c){ return '<option>'+c+'</option>'; }).join('');
  $('mBody').innerHTML=
    '<div id="tmplMgmtList"></div>'+
    '<div class="fgroup" style="margin-top:10px">'+
      '<div class="fsec"><i class="ti ti-plus"></i> 新增模板</div>'+
      '<div class="fg"><label class="fl">分類</label><input class="fi" id="nt_cat" placeholder="鼓勵" list="nt_catdl"/><datalist id="nt_catdl">'+datalist+'</datalist></div>'+
      '<div class="fg"><label class="fl">模板文字</label><textarea class="fi" id="nt_txt" rows="2" placeholder="輸入常用回覆文字…"></textarea></div>'+
    '</div>'+
    '<button class="btn btn-g btn-bl" id="saveTmplBtn"><i class="ti ti-plus"></i> 新增</button>'+
    '<button class="btn btn-o btn-bl" id="backReplyBtn" style="margin-top:6px"><i class="ti ti-arrow-left"></i> 返回回覆</button>';
  rebuildTmplList();
  on('saveTmplBtn','onclick',function(){
    var cat=$('nt_cat').value.trim(), txt=$('nt_txt').value.trim();
    if(!cat||!txt){ toast('請填寫分類和內容'); return; }
    db.templates.push({id:Date.now(),category:cat,text:txt});
    $('nt_cat').value=''; $('nt_txt').value='';
    dbSave(); rebuildTmplList(); toast('✓ 已新增');
  });
  on('backReplyBtn','onclick',function(){ showReplyModal(rid,fromDaily); });
}

// ── follow-up ──
function renderFollowUp(){
  var s=db.followUpSettings;
  var all=db.customers;
  var danger=all.filter(function(c){ return getFollowUpStatus(c).status==='danger'; });
  var warn=all.filter(function(c){ return getFollowUpStatus(c).status==='warn'; });
  var ok=all.filter(function(c){ return getFollowUpStatus(c).status==='ok'; });
  var body=$('followupBody'); body.innerHTML='';

  // stats
  var stats=el('div','');
  stats.innerHTML=
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px">'+
      '<div style="background:var(--rl);border-radius:var(--r1);padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--re)">'+danger.length+'</div><div style="font-size:11px;color:var(--re)">危險</div></div>'+
      '<div style="background:var(--ol);border-radius:var(--r1);padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--or)">'+warn.length+'</div><div style="font-size:11px;color:var(--or)">積極</div></div>'+
      '<div style="background:#f0fdf4;border-radius:var(--r1);padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:#15803d">'+ok.length+'</div><div style="font-size:11px;color:#15803d">正常</div></div>'+
    '</div>'+
    '<div style="background:var(--al);border-radius:var(--r1);padding:10px;margin-bottom:12px;font-size:12px;color:#6b4c10">'+
      '<i class="ti ti-info-circle"></i> 新顧客（≤'+s.newCustomerDays+'天）：每 <strong>'+s.newFreqDays+' 天</strong>・舊顧客：每 <strong>'+s.oldFreqDays+' 天</strong>回訪'+
    '</div>';
  body.appendChild(stats);

  function addGroup(title,cls,arr){

      '<div class="photo-slot meal-slot" data-label="點心"><i class="ti ti-cookie" style="font-size:18px;color:var(--th)"></i><div style="font-size:9px;color:var(--th);margin-top:3px">點心</div></div>'+

    var file=e.target.files[0]; if(!file) return;

    r2.onload=function(ev){

// ── my progress (customer) ──
function renderMyProgress(){
  var body=$('progressBody'); body.innerHTML='';
  var c=db.customers.find(function(x){ return x.name===currentUser; });
  if(!c){ body.innerHTML='<div class="empty"><i class="ti ti-user-off"></i><p>找不到您的資料</p></div>'; return; }
  var p=c.periods[c.periods.length-1], weeks=p.weeks;
  var last=weeks.length?weeks[weeks.length-1].weight:p.startWeight;
  var lost=+(p.startWeight-last).toFixed(1), needed=+(p.startWeight-p.targetWeight).toFixed(1);
  var pct=needed>0?Math.min(100,Math.round(lost/needed*100)):0;

  body.innerHTML=
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'+
      '<div class="av" style="width:46px;height:46px;font-size:18px">'+c.name[0]+'</div>'+
      '<div><div style="font-size:17px;font-weight:700">'+c.name+'</div><div style="font-size:12px;color:var(--tm)">'+c.height+'cm・'+c.age+'歲</div></div>'+
    '</div>'+
    '<div class="banner"><h3>挑戰 '+p.months+' 個月・目標減 '+p.targetPct+'%</h3>'+
      '<div class="big">'+last+'<span style="font-size:15px;font-weight:400"> kg</span></div>'+

// ── export / Google Sheets sync ──
var SYNC_URL_KEY='jk_sync_url';

function buildSyncPayload(){
  var customers=db.customers.map(function(c){
    var p=c.periods[c.periods.length-1];
    var last=p.weeks.length?p.weeks[p.weeks.length-1].weight:p.startWeight;
    var needed=+(p.startWeight-p.targetWeight).toFixed(1);
    var lost=+(p.startWeight-last).toFixed(1);
    var pct=needed>0?Math.min(100,Math.round(lost/needed*100)):0;
    var pl=c.planId?db.plans.find(function(x){ return x.id===c.planId; }):null;
    return {id:c.id,name:c.name,gender:c.gender,height:c.height,age:c.age,category:c.category,
      phone:c.phone,health:c.health,allergy:c.allergy,products:c.products,
      lastBuyMethod:c.lastBuyMethod,lastBuyDate:c.lastBuyDate,createdDate:c.createdDate,
      lastVisitDate:c.lastVisitDate,currentWeight:last,targetWeight:p.targetWeight,progressPct:pct,
      planName:pl?pl.name:'',note:c.note||''};
  });

  var periods=[],weeks=[];
  db.customers.forEach(function(c){
    c.periods.forEach(function(p){
      periods.push({customerId:c.id,customerName:c.name,period:p.label,months:p.months,
        targetPct:p.targetPct,startWeight:p.startWeight,targetWeight:p.targetWeight,
        startDate:p.startDate,endDate:p.endDate,supplements:(p.supplements||[]).join('、')});
      (p.weeks||[]).forEach(function(w){
        weeks.push({customerId:c.id,customerName:c.name,period:p.label,week:w.week,date:w.date,
          weight:w.weight,bodyAge:w.bodyAge,bodyFat:w.bodyFat,visceralFat:w.visceralFat,
          subFat:w.subFat,bmr:w.bmr,bmi:w.bmi,boneMuscle:w.boneMuscle,
          waist:w.waist,hip:w.hip,thigh:w.thigh,arm:w.arm,note:w.note||''});
      });
    });
  });

  var reports=db.reports.map(function(r){
    var c=db.customers.find(function(x){ return x.id===r.customerId; });
    var qaStr=r.qa?Object.keys(r.qa).map(function(k){ return k+': '+r.qa[k]; }).join('; '):'';
    return {id:r.id,customerName:c?c.name:'已刪除',date:r.date,note:r.note,reply:r.reply,
      supps:(r.supps||[]).join('、'),qa:qaStr};
  });

  var users=db.users.map(function(u){
    return {id:u.id,name:u.name,role:u.role,active:u.active?'啟用':'停用',dealerCategory:u.dealerCategory||''};
  });

  var plans=db.plans.map(function(pl){
    return {id:pl.id,name:pl.name,type:pl.type,waterGoal:pl.waterGoal,sleepGoal:pl.sleepGoal,
      exerciseFreq:pl.exerciseFreq,forbidFoods:pl.forbidFoods,monthOneNotes:pl.monthOneNotes,
      weightAlert:pl.weightAlert,fatAlert:pl.fatAlert,supplements:(pl.supplements||[]).join('、'),
      notes:pl.notes||''};
  });

  var guides=db.guides.map(function(g){
    return {id:g.id,category:g.category===0?'專欄文章':'如何挑選飲食',title:g.title,text:g.text,date:g.date};
  });

  var templates=db.templates.map(function(t){
    return {id:t.id,category:t.category,text:t.text};
  });

  var categories=db.categories.map(function(c,i){ return {idx:i+1,name:c}; });

  var fu=db.followUpSettings||{};
  var settings=[
    {key:'新顧客天數門檻',value:fu.newCustomerDays},
    {key:'新顧客回訪頻率(天)',value:fu.newFreqDays},
    {key:'舊顧客回訪頻率(天)',value:fu.oldFreqDays},
    {key:'積極提醒天數',value:fu.warnDays},
    {key:'危險提醒天數',value:fu.dangerDays}
  ];

  return {customers:customers,periods:periods,weeks:weeks,reports:reports,users:users,
    plans:plans,guides:guides,templates:templates,categories:categories,settings:settings,
    fullData:JSON.stringify(db)};
}

function syncToSheets(url,silent){
  return fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(buildSyncPayload())})
    .then(function(res){ return res.text(); })
    .then(function(text){
      var st=$('syncStatus');
      var parsed=null;
      try{ parsed=JSON.parse(text); }catch(e){}
      if(parsed&&parsed.ok===true){
        if(st) st.textContent='✓ 上次同步：'+new Date().toLocaleString();
        if(!silent) toast('✓ 已同步到 Google Sheets');
      } else {
        var detail=parsed&&parsed.error?parsed.error:(/^\s*<!DOCTYPE html/i.test(text)?'網址錯誤：請填入「部署為網路應用程式」後的 Apps Script 網址（結尾為 /exec），而非 Google 試算表網址':text.slice(0,200));
        if(st) st.textContent='✗ 同步失敗：'+detail;
        if(!silent) toast('✗ 同步失敗，請確認 Apps Script 設定');
      }
    })
    .catch(function(err){
      var st=$('syncStatus'); if(st) st.textContent='✗ 同步失敗：'+err.message;
      if(!silent) toast('✗ 同步失敗，請確認網址');
    });
}

// auto-sync with 1.5s debounce; blocked until first cloud pull completes
function autoSync(){
  if(!syncPulled) return;
  var url=localStorage.getItem(SYNC_URL_KEY);
  if(!url) return;
  if(syncTimer) clearTimeout(syncTimer);
  var st=$('syncStatus'); if(st) st.textContent='同步中…';
  syncTimer=setTimeout(function(){ syncTimer=null; syncToSheets(url,true); },1500);
}

function renderExport(){
  var body=$('exportBody'); body.innerHTML='';
  var savedUrl=localStorage.getItem(SYNC_URL_KEY)||'';

  var hint=el('div','hint-bar hint-info');
  hint.innerHTML='<i class="ti ti-info-circle"></i><div>將顧客資料、挑戰期、週記錄、每日回報、使用者、計劃卡、飲食指南、回覆模板、分類與回訪設定，完整同步到 Google 試算表（各自獨立分頁）。設定網址後，每次資料變動會立即自動同步，無需手動操作。</div>';
  body.appendChild(hint);

  var card=el('div','card');
  card.innerHTML=
    '<div class="card-title"><i class="ti ti-cloud-upload"></i> Google Sheets 同步設定</div>'+
    '<div class="fg"><label class="fl">Apps Script 網址</label><input class="fi" id="syncUrl" placeholder="https://script.google.com/macros/s/xxx/exec" value="'+savedUrl+'"/></div>'+
    '<div id="syncStatus" style="font-size:12px;color:var(--tm)"></div>';
  body.appendChild(card);

  on('syncUrl','onchange',function(){
    var url=$('syncUrl').value.trim();
    localStorage.setItem(SYNC_URL_KEY,url);
    if(url){ $('syncStatus').textContent='同步中…'; syncToSheets(url,true); }
    else { $('syncStatus').textContent=''; }
  });
}

// ── import API (for console use) ──
window._jkImport=function(cust){
  if(db.customers.find(function(c){return c.name===cust.name;})){toast('已存在：'+cust.name);return;}
  if(cust.category&&!db.categories.includes(cust.category)) db.categories.push(cust.category);
  db.customers.push(cust);
  dbSave(); toast('✓ 已匯入：'+cust.name);
};

// ── init ──
var SYNC_URL_DEFAULT='https://script.google.com/macros/s/AKfycbx0m_8JYOc5O8vSJM1Ks6WCfz2PpEJGjmzuRY6ZmU0uEKV-s_8inehBomWv17lGx6sIRA/exec';
function init(){
  dbLoad();
  if(!localStorage.getItem(SYNC_URL_KEY)) localStorage.setItem(SYNC_URL_KEY,SYNC_URL_DEFAULT);
  on('loginBtn','onclick',doLogin);
  on('loginName','onkeydown',function(e){ if(e.key==='Enter') doLogin(); });
  on('logoutBtn','onclick',doLogout);
  on('ov','onclick',function(e){ if(e.target===$('ov')) closeModal(); });
  on('searchInput','oninput',function(e){ renderCustList(e.target.value); });
  on('detailBack','onclick',function(){ goPage(detailReturnPage); navActive(detailReturnNav); });
  on('inputBack','onclick',function(){ goPage('pg-detail'); });
  on('gt0','onclick',function(){ switchGuide(0); });
  on('gt1','onclick',function(){ switchGuide(1); });
  on('fuSettingsBtn','onclick',showFollowUpSettings);
  on('addPlanBtn','onclick',function(){ showEditPlan(null); });
  on('addCustBtn','onclick',showAddCustomer);
  on('addGuideBtn','onclick',showAddGuide);
  on('addUserBtn','onclick',showAddUser);
  on('catMgmtBtn','onclick',showCatMgmt);
  $('loginName').value='宥霖';
}

init();
})();
</script>
